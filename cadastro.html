<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Academia Fit</title>

    <link rel="stylesheet" href="css/cadastro.css">
</head>

<body>

    <div class="container">

        <h1>Criar Conta</h1>

        <form id="formCadastro">

            <input
                type="text"
                id="nome"
                placeholder="Nome Completo"
                required>

            <input
                type="email"
                id="email"
                placeholder="E-mail"
                required>

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                minlength="6"
                required>

            <input
                type="password"
                id="confirmarSenha"
                placeholder="Confirmar Senha"
                minlength="6"
                required>

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <div id="mensagem"></div>

        <div class="login-link">
            Já possui uma conta?
            <a href="index.html">Entrar</a>
        </div>

    </div>

    <!-- IMPORTANTE: type="module" -->
    <script type="module" src="js/cadastro.js"></script>

</body>

</html>
