<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Academia Fit</title>

    <link rel="icon" type="image/png" href="gifs/Logo.png">

    <link rel="icon" type="image/png" href="imagens/favicon.png">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/cadastro.css">
</head>

<body>

<div class="container">

    <div class="logo">
        <i class="fa-solid fa-dumbbell"></i>
    </div>

    <h1>Criar Conta</h1>

    <p class="subtitulo">
        Cadastre-se para começar seus treinos
    </p>

    <form id="formCadastro">

        <div class="campo">
            <label for="nome">Nome Completo</label>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="nome"
                    placeholder="Digite seu nome"
                    required>
            </div>
        </div>

        <div class="campo">
            <label for="email">E-mail</label>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu e-mail"
                    required>
            </div>
        </div>

        <div class="campo">
            <label for="senha">Senha</label>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    minlength="6"
                    required>
            </div>
        </div>

        <div class="campo">
            <label for="confirmarSenha">Confirmar senha</label>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="confirmarSenha"
                    placeholder="Confirme sua senha"
                    minlength="6"
                    required>
            </div>
        </div>

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <div id="mensagem"></div>

    <p class="login-link">
        Já possui uma conta?
        <a href="index.html">Entrar</a>
    </p>

</div>

<script type="module" src="js/cadastro.js"></script>

</body>

</html>
